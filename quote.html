<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="refresh" content="0; url=/#quote"/>
  <title>Free Quote — Evergreen Cleaning Services</title>
  <meta name="description" content="Get a free house cleaning quote from Evergreen Cleaning Services. Serving Citrus County and surrounding Central Florida areas."/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e8f4fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 480px;
      width: 100%;
      padding: 40px 36px;
      text-align: center;
    }
    .logo { font-size: 32px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 700; color: #0d2a42; margin-bottom: 10px; line-height: 1.3; }
    p { font-size: 15px; color: #4b5563; margin-bottom: 24px; line-height: 1.6; }
    .areas { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 28px; }
    .area-tag { background: #e3f2fd; color: #1565a8; border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 600; }
    .btn {
      display: inline-block; background: #1565a8; color: #fff;
      font-size: 16px; font-weight: 700; padding: 14px 32px;
      border-radius: 10px; text-decoration: none; transition: background 0.2s;
    }
    .btn:hover { background: #0d2a42; }
    .sub { font-size: 13px; color: #9ca3af; margin-top: 16px; margin-bottom: 0; }
  </style>
  <script>window.location.replace('/#quote');</script>
</head>
<body>
  <div class="card">
    <div class="logo">🫧</div>
    <h1>Get a free house cleaning quote</h1>
    <p>We serve homeowners across Citrus County and surrounding areas. Tell us about your home — takes about 30 seconds.</p>
    <div class="areas">
      <span class="area-tag">Citrus County</span>
      <span class="area-tag">Marion County</span>
      <span class="area-tag">Levy County</span>
      <span class="area-tag">Hernando County</span>
      <span class="area-tag">Sumter County</span>
    </div>
    <a href="/#quote" class="btn">Get My Free Quote →</a>
    <p class="sub">No commitment. Standard cleans from $79.</p>
  </div>
</body>
</html>
