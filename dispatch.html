<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dispatch Board — Evergreen Cleaning Services</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep:#1a3a1a; --green-mid:#2d6a2d; --green-light:#e8f5e9;
    --green-pale:#f0f7f0; --border:#e2e8f0; --text:#1e293b;
    --text-muted:#64748b; --red:#dc2626;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:#f4f7f4; color:var(--text); min-height:100vh; }

  /* ── Login ── */
  #loginScreen {
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; background:var(--green-deep);
  }
  .login-box {
    background:#fff; border-radius:20px; padding:40px 36px;
    max-width:400px; width:92%; box-shadow:0 8px 40px rgba(0,0,0,.18);
  }
  .login-logo { font-family:'Playfair Display',serif; font-size:22px; color:var(--green-deep); margin-bottom:4px; }
  .login-sub  { font-size:13px; color:var(--text-muted); margin-bottom:24px; }
  .login-input {
    width:100%; padding:13px 16px; border:2px solid var(--border);
    border-radius:12px; font-size:15px; font-family:inherit; outline:none;
    margin-bottom:12px; transition:border .2s;
  }
  .login-input:focus { border-color:var(--green-mid); }
  .login-btn {
    width:100%; padding:14px; background:var(--green-mid); color:#fff;
    border:none; border-radius:12px; font-size:15px; font-weight:700;
    font-family:inherit; cursor:pointer; transition:opacity .15s;
  }
  .login-btn:hover { opacity:.88; }
  .login-btn:disabled { opacity:.55; cursor:not-allowed; }
  #loginMsg { font-size:13px; color:var(--text-muted); margin-top:10px; text-align:center; }
  #loginErr { font-size:13px; color:var(--red); margin-top:8px; text-align:center; display:none; }

  /* ── App shell ── */
  #appScreen { display:none; flex-direction:column; min-height:100vh; }
  header {
    background:var(--green-deep); color:#fff; padding:0 20px;
    display:flex; align-items:center; justify-content:space-between;
    height:56px; flex-shrink:0; position:sticky; top:0; z-index:100;
  }
  .hdr-brand { font-family:'Playfair Display',serif; font-size:18px; display:flex; align-items:center; gap:10px; }
  .hdr-right  { display:flex; align-items:center; gap:12px; }
  .hdr-btn { padding:7px 14px; border-radius:8px; border:1.5px solid rgba(255,255,255,.3); background:transparent; color:#fff; font-size:13px; font-family:inherit; cursor:pointer; transition:all .15s; }
  .hdr-btn:hover { background:rgba(255,255,255,.12); }

  /* ── Controls bar ── */
  .controls-bar {
    background:#fff; border-bottom:1.5px solid var(--border);
    padding:14px 20px; display:flex; align-items:center;
    justify-content:space-between; flex-wrap:wrap; gap:12px;
    position:sticky; top:56px; z-index:90;
  }
  .controls-left  { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .controls-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .date-nav-btn {
    padding:8px 14px; border:1.5px solid var(--border); border-radius:8px;
    background:#fff; font-size:13px; font-family:inherit; cursor:pointer;
    transition:all .15s; font-weight:600;
  }
  .date-nav-btn:hover { border-color:var(--green-mid); color:var(--green-mid); }
  .date-nav-btn.today { background:var(--green-mid); color:#fff; border-color:var(--green-mid); }
  .date-input {
    padding:8px 12px; border:1.5px solid var(--border); border-radius:8px;
    font-size:14px; font-family:inherit; outline:none; background:#fff;
  }
  .date-input:focus { border-color:var(--green-mid); }
  .crew-select {
    padding:8px 12px; border:1.5px solid var(--border); border-radius:8px;
    font-size:13px; font-family:inherit; outline:none; background:#fff; cursor:pointer;
  }
  .date-label {
    font-size:16px; font-weight:700; color:var(--green-deep);
  }

  /* ── Legend ── */
  .legend { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); font-weight:500; flex-wrap:wrap; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }

  /* ── Board ── */
  .board-wrap { flex:1; padding:20px; overflow-x:auto; }
  .board-outer {
    background:#fff; border:1.5px solid var(--border); border-radius:16px;
    overflow:hidden; min-width:900px;
  }
  .board-time-axis {
    display:flex; border-bottom:2px solid var(--border);
    background:#f8faf6; position:sticky; top:0; z-index:10;
  }
  .board-label-col {
    width:160px; min-width:160px; flex-shrink:0; padding:12px 16px;
    font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.07em; color:var(--text-muted); border-right:1.5px solid var(--border);
  }
  .board-time-slots { flex:1; display:flex; }
  .board-time-slot {
    flex:1; text-align:center; font-size:11px; color:var(--text-muted);
    font-weight:600; padding:12px 0; border-right:1px solid var(--border);
  }
  .board-time-slot:last-child { border-right:none; }

  .board-crew-row { display:flex; border-bottom:1.5px solid var(--border); min-height:88px; }
  .board-crew-row:last-child { border-bottom:none; }
  .board-crew-label {
    width:160px; min-width:160px; flex-shrink:0; padding:14px 16px;
    border-right:1.5px solid var(--border); background:#f8faf6;
    display:flex; flex-direction:column; justify-content:center; gap:4px;
  }
  .board-crew-name  { font-size:14px; font-weight:700; color:var(--green-deep); }
  .board-crew-count { font-size:11px; color:var(--text-muted); }
  .board-job-track  {
    flex:1; position:relative; min-height:88px;
    background:repeating-linear-gradient(
      90deg, transparent, transparent calc(100%/12 - 1px),
      var(--border) calc(100%/12 - 1px), var(--border) calc(100%/12)
    );
  }

  .job-block {
    position:absolute; top:10px; height:calc(100% - 20px);
    border-radius:8px; cursor:pointer; display:flex; flex-direction:column;
    justify-content:center; padding:7px 10px; overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,.12); transition:transform .15s, box-shadow .15s;
    min-width:80px;
  }
  .job-block:hover { transform:translateY(-2px); box-shadow:0 5px 16px rgba(0,0,0,.2); z-index:5; }
  .job-block.upcoming  { background:#16a34a; color:#fff; }
  .job-block.done      { background:#64748b; color:#fff; }
  .job-block.cash      { background:#b45309; color:#fff; }
  .job-block.invoiced  { background:#1d4ed8; color:#fff; }
  .job-block.paid      { background:#7c3aed; color:#fff; }
  .job-block.completed { background:#374151; color:#9ca3af; }
  .job-name { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .job-time { font-size:10px; opacity:.82; white-space:nowrap; }
  .job-plan { font-size:10px; opacity:.72; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ── Empty state ── */
  .board-empty {
    text-align:center; padding:64px 20px;
    color:var(--text-muted); font-size:15px;
  }

  /* ── Detail panel (bottom sheet) ── */
  .detail-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.45); z-index:200;
    align-items:flex-end; justify-content:center;
  }
  .detail-overlay.open { display:flex; }
  .detail-panel {
    background:#fff; border-radius:20px 20px 0 0;
    width:100%; max-width:660px; max-height:88vh;
    overflow-y:auto; box-shadow:0 -8px 40px rgba(0,0,0,.18);
    animation:slideUp .22s ease;
  }
  @keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .detail-topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px 12px; border-bottom:1.5px solid var(--border);
    position:sticky; top:0; background:#fff; z-index:2;
  }
  .detail-tabs { display:flex; gap:4px; flex-wrap:wrap; }
  .d-tab-btn {
    padding:7px 14px; border:1.5px solid var(--border); border-radius:8px;
    background:#fff; font-size:13px; font-family:inherit; cursor:pointer;
    transition:all .15s; font-weight:500; color:var(--text-muted);
  }
  .d-tab-btn.active { background:var(--green-mid); border-color:var(--green-mid); color:#fff; font-weight:700; }
  .close-btn {
    width:34px; height:34px; border-radius:50%; border:1.5px solid var(--border);
    background:#fff; font-size:16px; cursor:pointer; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
    transition:all .15s;
  }
  .close-btn:hover { background:#fee2e2; border-color:#fca5a5; color:#dc2626; }
  .d-tab-pane { display:none; padding:20px; }
  .d-tab-pane.active { display:block; }

  /* ── Detail rows ── */
  .d-row { display:flex; gap:8px; margin-bottom:10px; font-size:14px; }
  .d-label { width:110px; font-weight:600; color:var(--text-muted); font-size:13px; flex-shrink:0; }
  .d-val   { flex:1; color:var(--text); word-break:break-word; }
  .d-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:20px; padding-top:16px; border-bottom:1.5px solid var(--border); border-top:1.5px solid var(--border); padding-bottom:16px; }
  .d-btn {
    padding:10px 18px; border-radius:10px; border:none;
    font-size:13px; font-weight:700; font-family:inherit;
    cursor:pointer; transition:opacity .15s; text-decoration:none;
    display:inline-flex; align-items:center;
  }
  .d-btn:hover { opacity:.85; }
  .notes-box {
    background:#f8faf8; border:1.5px solid var(--border); border-radius:10px;
    padding:12px 14px; font-size:13px; color:var(--text); line-height:1.6;
    white-space:pre-wrap; word-break:break-word; margin-bottom:12px;
  }
  .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
  .photo-thumb {
    aspect-ratio:1; border-radius:10px; overflow:hidden;
    border:1.5px solid var(--border); background:#f1f5f9;
    cursor:pointer; transition:opacity .15s;
  }
  .photo-thumb:hover { opacity:.85; }
  .photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .hist-row {
    padding:12px 0; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
  }
  .hist-row:last-child { border-bottom:none; }

  /* ── Toast ── */
  #toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#1a3a1a; color:#fff; padding:12px 24px; border-radius:12px;
    font-size:14px; font-weight:600; z-index:500; opacity:0;
    transition:opacity .25s, transform .25s; pointer-events:none; white-space:nowrap;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── Photo lightbox ── */
  .lightbox {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.92);
    z-index:900; align-items:center; justify-content:center;
  }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:92vw; max-height:88vh; border-radius:12px; }

</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🫧 Evergreen Dispatch</div>
    <div class="login-sub">Staff login required</div>
    <div id="loginStep1">
      <input class="login-input" type="email" id="emailInput" placeholder="Staff email address"
             onkeydown="if(event.key==='Enter')requestCode()">
      <button class="login-btn" id="codeBtn" onclick="requestCode()">Send Login Code</button>
    </div>
    <div id="loginStep2" style="display:none;">
      <input class="login-input" type="text" id="codeInput" placeholder="6-digit code"
             inputmode="numeric" maxlength="6" onkeydown="if(event.key==='Enter')verifyCode()">
      <button class="login-btn" id="verifyBtn" onclick="verifyCode()">Sign In</button>
    </div>
    <div id="loginMsg"></div>
    <div id="loginErr"></div>
  </div>
</div>

<!-- App -->
<div id="appScreen" style="display:none;flex-direction:column;min-height:100vh;">
  <header>
    <div class="hdr-brand">📅 Dispatch Board</div>
    <div class="hdr-right">
      <span id="hdrGreeting" style="font-size:13px;color:rgba(255,255,255,.7);"></span>
      <span id="hdrRole" style="font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.15);color:#fff;"></span>
      <button class="hdr-btn" onclick="openZoneGuide()">🗺 Zone Guide</button>
      <button class="hdr-btn" onclick="loadJobs()">↻ Refresh</button>
      <a class="hdr-btn" href="invoice.html">← Admin</a>
      <button class="hdr-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </header>

  <div class="controls-bar">
    <div class="controls-left">
      <button class="date-nav-btn" onclick="shiftDate(-1)">◀</button>
      <button class="date-nav-btn today" onclick="goToday()">Today</button>
      <button class="date-nav-btn" onclick="shiftDate(1)">▶</button>
      <input type="date" id="dispDate" class="date-input" onchange="renderBoard()">
      <span class="date-label" id="dispDateLabel"></span>
    </div>
    <div class="controls-right">
      <select id="crewFilter" class="crew-select" onchange="renderBoard()">
        <option value="all">👥 All Crews</option>
        <option value="A">🔵 Crew A</option>
        <option value="B">🩷 Crew B</option>
        <option value="unassigned">⬜ Unassigned</option>
      </select>
      <div class="legend">
        <span class="legend-dot" style="background:#16a34a;"></span>Upcoming
        <span class="legend-dot" style="background:#64748b;margin-left:8px;"></span>Done
        <span class="legend-dot" style="background:#b45309;margin-left:8px;"></span>Cash
        <span class="legend-dot" style="background:#1d4ed8;margin-left:8px;"></span>Invoiced
        <span class="legend-dot" style="background:#7c3aed;margin-left:8px;"></span>Paid
        <span class="legend-dot" style="background:#374151;margin-left:8px;"></span>Completed
      </div>
    </div>
  </div>

  <div class="board-wrap">
    <div id="boardOuter" class="board-outer" style="display:none;">
      <div class="board-time-axis" id="timeAxis"></div>
      <div id="boardRows"></div>
    </div>
    <div id="boardEmpty" class="board-empty" style="display:none;">
      📭 No jobs scheduled for this date.
    </div>
    <div id="boardLoading" class="board-empty">Loading jobs…</div>
  </div>
</div>

<!-- Detail panel -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel">
    <div class="detail-topbar">
      <div class="detail-tabs">
        <button class="d-tab-btn active" id="dTab-info"    onclick="showDTab('info')">📋 Info</button>
        <button class="d-tab-btn"        id="dTab-notes"   onclick="showDTab('notes')">📝 Notes</button>
        <button class="d-tab-btn"        id="dTab-photos"  onclick="showDTab('photos')">📷 Photos</button>
        <button class="d-tab-btn"        id="dTab-history" onclick="showDTab('history')">🗂 History</button>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="d-tab-pane active" id="dp-info"></div>
    <div class="d-tab-pane"        id="dp-notes"></div>
    <div class="d-tab-pane"        id="dp-photos"></div>
    <div class="d-tab-pane"        id="dp-history"></div>
  </div>
</div>

<!-- Photo lightbox -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightboxImg" alt="Job photo">
</div>

<div id="toast"></div>

<!-- Zone Guide Modal -->
<div id="zoneGuideOverlay" onclick="if(event.target===this)closeZoneGuide()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:16px;">
  <div style="background:#fff;border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.22);animation:slideUp .22s ease;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1.5px solid #e2e8f0;position:sticky;top:0;background:#fff;z-index:2;">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:18px;color:#1a3a1a;">🗺 Zone Schedule Guide</div>
        <div style="font-size:12px;color:#64748b;margin-top:2px;">Reference only — use this while rebooking customers into the right days</div>
      </div>
      <button onclick="closeZoneGuide()" style="width:34px;height:34px;border-radius:50%;border:1.5px solid #e2e8f0;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>
    </div>
    <div style="padding:20px;">

      <!-- Tabs -->
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button id="zgTabCurrent" onclick="switchZgTab('current')">📍 Current — 1 Crew</button>
        <button id="zgTabFuture"  onclick="switchZgTab('future')">🔮 Future — 2 Crews</button>
      </div>

      <!-- Table (thead+tbody injected by renderZoneGuide) -->
      <table id="zoneGuideBody" style="width:100%;border-collapse:collapse;font-family:'Inter',sans-serif;"></table>

      <div id="zoneGuideNote" style="margin-top:16px;background:#f8faf8;border-radius:10px;padding:12px 14px;font-size:12px;color:#374151;line-height:1.7;"></div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAbZCSvrFrB9AT7P0elSBueERyllZuYOOgV6wGVld54al3aBQNCxYonGuiDDdrvJ7suw/exec';
const SESSION_KEY = 'eg_staff_session';
const START_HOUR  = 7;
const END_HOUR    = 19;
const TOTAL_MINS  = (END_HOUR - START_HOUR) * 60;

let adminToken = '', adminName = '', adminEmail = '', adminRole = 'employee';
let allBookings = [], allCustomers = [];
let _detailIdx  = -1;

// ── Helpers ──────────────────────────────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function cap(s) { const t=String(s??''); return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase(); }
function authParam() { return 'adminToken='+encodeURIComponent(adminToken)+'&adminEmail='+encodeURIComponent(adminEmail); }
function showToast(msg,dur=2800) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}
function isDone(b) { const d=String(b.done||''); return b.rowCompleted||d.includes('Done')||d.startsWith('✓'); }
function isCash(b) { const c=String(b.calendarEvent||'').toLowerCase(),p=String(b.payMethod||'').toLowerCase(); return c.includes('cash')||p.includes('cash'); }
function isPaid(b) {
  const c=String(b.calendarEvent||'').toLowerCase(),p=String(b.payMethod||'').toLowerCase();
  if (c.includes('not paid')||c.includes('pending')) return false;
  return c.includes('✅')||c.includes('autopay')||c.includes('auto-pay')||p.includes('autopay')||p.includes('auto-pay');
}
function dateOf(b) {
  const raw = b.serviceDate || b.serviceDateRaw || '';
  if (!raw) return '';
  const s = String(raw).trim();
  const d = new Date(s.includes('T')?s:s+'T12:00');
  if (isNaN(d)) return s.slice(0,10);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function mowMin(b) {
  const n=String(b.notes||'').toLowerCase();
  if (/yard[:\s]+x?l|extra.large/.test(n)) return 75;
  if (/yard[:\s]+large/.test(n))           return 55;
  if (/yard[:\s]+small/.test(n))           return 25;
  return 40;
}
function fmtTime(startMin) {
  const abs=START_HOUR*60+startMin, h=Math.floor(abs/60), m=abs%60;
  const ap=h>=12?'PM':'AM', hd=h>12?h-12:h===0?12:h;
  return hd+':'+String(m).padStart(2,'0')+' '+ap;
}
function jobClass(b) {
  if (b.rowCompleted) return 'completed';
  if (isDone(b))      return 'done';
  const cash=isCash(b), inv=String(b.invoiced||'').length>2;
  if (cash&&!isPaid(b)) return 'cash';
  if (inv) return 'invoiced';
  if (isPaid(b)) return 'paid';
  return 'upcoming';
}

// ── Auth ─────────────────────────────────────────────────────────────────
function loadSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; }
}
function saveSession(token,name,email,role) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({token,name,email,role,ts:Date.now()}));
}
function doLogout() {
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}
async function requestCode() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email||!email.includes('@')) { showLoginErr('Enter a valid email.'); return; }
  const btn = document.getElementById('codeBtn');
  btn.disabled=true; btn.textContent='Sending…';
  document.getElementById('loginErr').style.display='none';
  try {
    const res  = await fetch(SCRIPT_URL+'?action=admin_request_code&email='+encodeURIComponent(email));
    const data = await res.json();
    if (data.success) {
      adminEmail = email;
      document.getElementById('loginStep1').style.display='none';
      document.getElementById('loginStep2').style.display='block';
      document.getElementById('loginMsg').textContent='Code sent to '+email;

async function loadJobs() {

    document.getElementById('boardLoading').textContent='⚠️ '+err.message+' — check your connection.';

// ── Render ────────────────────────────────────────────────────────────────
function renderBoard() {
  updateDateLabel();
  const dateStr  = document.getElementById('dispDate').value;
  const crewFilt = document.getElementById('crewFilter').value;
  if (!dateStr) return;

  let dayJobs = allBookings.filter(b => dateOf(b)===dateStr && !b.rowCancelled);
  if (crewFilt!=='all') {
    dayJobs = dayJobs.filter(b => {
      const crew=(b.crew||'').trim();
      return crewFilt==='unassigned' ? !crew : crew===crewFilt;
    });
  }

  const outer=document.getElementById('boardOuter');
  const empty=document.getElementById('boardEmpty');

  if (!dayJobs.length) {
    outer.style.display='none'; empty.style.display='block'; return;
  }
  outer.style.display='block'; empty.style.display='none';

  // Time axis
  let axHtml='<div class="board-label-col">Crew / Employee</div><div class="board-time-slots">';
  for (let h=START_HOUR;h<END_HOUR;h++) {
    const lbl=h<12?h+' AM':h===12?'12 PM':(h-12)+' PM';
    axHtml+=`<div class="board-time-slot">${lbl}</div>`;
  }
  axHtml+='</div>';
  document.getElementById('timeAxis').innerHTML=axHtml;

  // Group by crew
  const crews={};
  dayJobs.forEach(b=>{ const k=b.crew||'Unassigned'; if(!crews[k]) crews[k]=[]; crews[k].push(b); });

  // Estimate sequential start times for jobs without a jobTime
  function estimateTimes(jobs) {
    let cur=60; // 8 AM default start
    return jobs.map(b=>{
      let start=cur;
      if (b.jobTime) {
        const [hh,mm]=b.jobTime.split(':').map(Number);
        start=(hh-START_HOUR)*60+(mm||0);
        if (start<0) start=0;
      }
      const dur=mowMin(b);
      cur=start+dur+20;
      return {b,start,dur};
    });
  }

  let rowsHtml='';
  const crewOrder = ['A','B',...Object.keys(crews).filter(k=>k!=='A'&&k!=='B')];
  for (const k of crewOrder) {
    if (!crews[k]) continue;
    const jobs=crews[k];
    const timed=estimateTimes(jobs);
    let blocks='';
    timed.forEach(({b,start,dur})=>{
      const left=Math.max(0,(start/TOTAL_MINS)*100);
      const width=Math.min(100-left,Math.max(1.8,(dur/TOTAL_MINS)*100));
      const cls=jobClass(b);
      const rowIdx=allBookings.indexOf(b);
      blocks+=`<div class="job-block ${cls}" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%;" onclick="openDetail(${rowIdx})" title="${esc(b.name||'')} — ${fmtTime(start)}">
        <div class="job-name">${esc(b.name||'—')}</div>
        <div class="job-time">${fmtTime(start)} · ${dur}m</div>
        <div class="job-plan">${esc(b.frequency||'')}</div>
      </div>`;
    });
    const lbl=k==='A'?'🔵 Crew A':k==='B'?'🩷 Crew B':k==='Unassigned'?'⬜ Unassigned':esc(k);
    rowsHtml+=`<div class="board-crew-row">
      <div class="board-crew-label">
        <div class="board-crew-name">${lbl}</div>
        <div class="board-crew-count">${jobs.length} job${jobs.length!==1?'s':''}</div>
      </div>
      <div class="board-job-track">${blocks}</div>
    </div>`;
  }
  document.getElementById('boardRows').innerHTML=rowsHtml;
}

  // ── Photos tab ──

    ?`<div class="photo-grid">${photos.map(u=>`<div class="photo-thumb" onclick="openLightbox('${esc(u)}')"><img src="${esc(u)}" alt="Job photo" onerror="this.parentElement.style.display='none'"></div>`).join('')}</div>`

  document.getElementById('dp-photos').innerHTML=photosHtml;

          ${isDone(j)?`<span style="background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;">✓ Done</span>`:`<span style="background:#fef9c3;color:#92400e;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;">Upcoming</span>`}

function renderZoneGuide() {
  const isCurrent = _zgTab === 'current';
  document.getElementById('zgTabCurrent').style.cssText = isCurrent
    ? 'padding:8px 18px;border:none;border-radius:8px;background:#1a3a1a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;'
    : 'padding:8px 18px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;';
  document.getElementById('zgTabFuture').style.cssText = !isCurrent
    ? 'padding:8px 18px;border:none;border-radius:8px;background:#1a3a1a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;'
    : 'padding:8px 18px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;';

  const body = document.getElementById('zoneGuideBody');
  const note = document.getElementById('zoneGuideNote');

  if (isCurrent) {
    // Single-crew paired view
    body.innerHTML = `
      <thead>
        <tr>
          <th style="background:#1a3a1a;color:#fff;padding:10px 12px;text-align:center;font-size:12px;width:70px;">Day</th>
          <th style="background:#1a3a1a;color:#fff;padding:10px 12px;text-align:center;font-size:12px;">Zone 1 — Start here</th>
          <th style="background:#1a3a1a;color:#fff;padding:10px 12px;text-align:center;font-size:12px;">Zone 2 — Roll into next</th>
        </tr>
      </thead>
      <tbody>${ZONE_PAIRS.map(row => {
        const isWeekend = false;
        if (row.flex) return `<tr>
          <td style="padding:10px 12px;background:#f0f6ff;border:1px solid #e2e8f0;text-align:center;font-size:12px;font-weight:700;color:#2a50a0;">FRI<br><span style="font-size:10px;font-weight:400;color:#9ca3af;">Friday</span></td>
          <td colspan="2" style="padding:12px 16px;background:#f0f6ff;border:1px solid #e2e8f0;color:#374151;font-size:13px;">
            <strong>Flex / Overflow day</strong> — all 8 zones are done Mon–Thu. Use Friday for biweekly customers, Z4 overflow (it's the biggest), or any zone that ran long.
          </td>
        </tr>`;
        return `<tr>
          <td style="padding:10px 12px;background:#f8faf6;border:1px solid #e2e8f0;text-align:center;font-size:12px;font-weight:700;color:#374151;">${row.day}<br><span style="font-size:10px;font-weight:400;color:#9ca3af;">${row.dayFull}</span></td>
          <td style="padding:10px 14px;background:#f8fbff;border:1px solid #e2e8f0;text-align:center;">
            <div style="display:inline-block;background:#d0e8ff;color:#1a4080;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;margin-bottom:4px;">${row.z1.zone}</div>
            <div style="font-size:12px;font-weight:600;color:#1e293b;">${row.z1.name}</div>
            <div style="font-size:10px;color:#64748b;margin-top:2px;">${row.z1.cities}</div>
          </td>
          <td style="padding:10px 14px;background:${row.z2.big?'#fff7f0':'#f8fbff'};border:1px solid #e2e8f0;text-align:center;">
            <div style="display:inline-block;background:${row.z2.big?'#fde8d0':'#d0e8ff'};color:${row.z2.big?'#a04010':'#1a4080'};font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;margin-bottom:4px;">${row.z2.zone}${row.z2.big?' ⭐':''}</div>
            <div style="font-size:12px;font-weight:600;color:#1e293b;">${row.z2.name}</div>
            <div style="font-size:10px;color:#64748b;margin-top:2px;">${row.z2.cities}</div>
            <div style="font-size:10px;color:#2d6a2d;background:#e8f5e8;border-radius:20px;padding:1px 7px;margin-top:4px;display:inline-block;">${row.drive}</div>
          </td>
        </tr>`;
      }).join('')}</tbody>`;
    note.innerHTML = '<strong>How it works:</strong> Start the morning in Zone 1, knock out all jobs there, then drive to Zone 2 and finish the day. Each pair is chosen so Zone 2 is the closest neighbor — no criss-crossing the map.';
  } else {
    // Future 2-crew view
    body.innerHTML = `
      <thead>
        <tr>
          <th style="background:#1a3a1a;color:#fff;padding:10px 12px;text-align:center;font-size:12px;width:70px;">Day</th>
          <th style="background:#1a3a1a;color:#fff;padding:10px 12px;text-align:center;font-size:12px;">💗 Crew A — April</th>
          <th style="background:#1a3a1a;color:#fff;padding:10px 12px;text-align:center;font-size:12px;">🔵 Crew B — Hunter &amp; Jon</th>
        </tr>
      </thead>
      <tbody>${ZONE_SCHEDULE.map(row => {
        const aCell = row.crewA
          ? `<td style="padding:10px 12px;background:${row.crewA.big?'#fff7f0':'#fff8fb'};border:1px solid #e2e8f0;text-align:center;">
               <div style="display:inline-block;background:${row.crewA.big?'#fce0ec':'#f7d6e6'};color:#a0305a;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;margin-bottom:4px;">${row.crewA.zone}</div>
               <div style="font-size:12px;font-weight:600;color:#1e293b;">${row.crewA.name}</div>
               <div style="font-size:10px;color:#64748b;margin-top:2px;">${row.crewA.cities}</div>
             </td>`
          : `<td style="padding:10px 12px;background:#fafafa;border:1px solid #e2e8f0;text-align:center;color:#cbd5e1;font-size:12px;">OFF</td>`;
        const bCell = row.crewB
          ? `<td style="padding:10px 12px;background:${row.crewB.weekend?'#eef6ff':'#f8fbff'};border:1px solid #e2e8f0;text-align:center;">
               <div style="display:inline-block;background:#d0e4f8;color:#1a4080;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;margin-bottom:4px;">${row.crewB.zone}</div>
               <div style="font-size:12px;font-weight:600;color:#1e293b;">${row.crewB.name}</div>
               <div style="font-size:10px;color:#64748b;margin-top:2px;">${row.crewB.cities}</div>
             </td>`
          : `<td style="padding:10px 12px;background:#fafafa;border:1px solid #e2e8f0;text-align:center;color:#cbd5e1;font-size:12px;">OFF</td>`;
        const isWeekend = row.day==='SAT'||row.day==='SUN';
        return `<tr>
          <td style="padding:10px 12px;background:${isWeekend?'#e8f2e8':'#f8faf6'};border:1px solid #e2e8f0;text-align:center;font-size:12px;font-weight:700;color:${isWeekend?'#2d6a2d':'#374151'};">
            ${row.day}<br><span style="font-size:10px;font-weight:400;color:${isWeekend?'#4a8a4a':'#9ca3af'};">${row.dayFull}</span>
          </td>${aCell}${bCell}
        </tr>`;
      }).join('')}</tbody>`;
    note.innerHTML = '<strong>Future setup:</strong> Crew A owns the north Citrus cluster (Z1–Z4), Crew B owns the south/east cluster (Z5–Z8). Z4 gets two days because it\'s the biggest zone.';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  // Try to restore session from localStorage (shared with invoice.html)
  const saved=loadSession();
  if (saved&&saved.token&&(Date.now()-saved.ts<(30*24*60*60*1000))) {
    adminToken=saved.token; adminName=saved.name||''; adminEmail=saved.email||''; adminRole=(saved.role||'employee');
    startApp();
  }
});
</script>
</body>
</html>
