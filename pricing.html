<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="refresh" content="0; url=/#pricing"/>
  <title>Pricing — Evergreen Cleaning Services</title>
  <meta name="description" content="View Evergreen Cleaning Services' flat-rate house cleaning pricing for Citrus County and surrounding areas."/>
  <script>window.location.replace('/#pricing');</script>
</head>
<body><!-- Visit tracking → analytics sheet (action=track_visit) -->
<script>
(function(){try{
  var TRACK_URL='https://script.google.com/macros/s/AKfycbxkrw4S5fjdvID0RRownPZqh-kQdUQzaNY7Z4CVbGefkyT2ai0IdmQBYR45ooL5fCMl/exec';
  var vid=localStorage.getItem('eg_vid');
  if(!vid){vid=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('eg_vid',vid);}
  var ref=document.referrer||'';
  if(!ref){ref='direct';}
  else if(/google/i.test(ref)){ref='google';}
  else if(/facebook/i.test(ref)){ref='facebook';}
  else if(/instagram/i.test(ref)){ref='instagram';}
  else{try{ref=new URL(ref).hostname;}catch(e){}}
  var p=new URLSearchParams({action:'track_visit',page:location.pathname||'/',ref:ref,ua:navigator.userAgent.substring(0,150),vid:vid});
  fetch(TRACK_URL+'?'+p.toString(),{method:'GET',mode:'no-cors',keepalive:true}).catch(function(){});
}catch(e){}})();
</script>
</body>
</html>
